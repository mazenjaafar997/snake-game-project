<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        #gameCanvas {
            border: 3px solid white;
            background-color: #1a1a2e;
            display: block;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .info {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .score-board {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 25px;
            border-radius: 8px;
        }

        .controls {
            color: white;
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .controls p {
            margin: 10px 0;
        }

        button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 10px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake Game</h1>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="info">
            <div class="score-board">Score: <span id="score">0</span></div>
            <div class="score-board">High Score: <span id="highScore">0</span></div>
        </div>
        <div class="controls">
            <p>Use Arrow Keys to move</p>
            <button onclick="toggleGame()">Start/Pause</button>
            <button onclick="resetGame()">Reset Game</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
